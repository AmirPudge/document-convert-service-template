services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "29092:29092" # хост-инструменты (kafka-ui и т.п.) → localhost:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Два listener'а: PLAINTEXT для Docker-сети, PLAINTEXT_HOST для хоста
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
    volumes:
      - kafka_data:/var/lib/kafka/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: documents
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080" # http://localhost:8081
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
        mc mb --ignore-existing local/documents;
      "

  camunda:
    image: camunda/camunda-bpm-platform:latest
    ports:
      - "8081:8080"
    environment:
      DB_DRIVER: h2
      DB_URL: jdbc:h2:./camunda-h2-db
    volumes:
      - camunda_data:/camunda/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: pdf.generate.requests
      KAFKA_GROUP_ID: document-convert-service
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/documents
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: documents
      S3_REGION: us-east-1
      S3_USE_PATH_STYLE: "true"
      CAMUNDA_BASE_URL: http://camunda:8080
      CAMUNDA_MESSAGE_NAME: pdf_generated
      CHANNEL_BUFFER: "100"

volumes:
  kafka_data:
  redis_data:
  postgres_data:
  minio_data:
  camunda_data:
